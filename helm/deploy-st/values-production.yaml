replicaCount: 2

image:
  app:
    tag: "v1.1.0"
  web:
    tag: "v1.1.0"

ingress:
  host: production.deploy-st.local

resources:
  app:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  web:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

pdb:
  enabled: true
  minAvailable: 1

env:
  APP_ENV: "production"
  APP_DEBUG: "false"
  LOG_LEVEL: "warning"

canary:
  enabled: true
  steps:
    - setWeight: 20
    - pause: { duration: 30s }
    - setWeight: 40
    - pause: { duration: 30s }
    - setWeight: 60
    - pause: { duration: 30s }
    - setWeight: 80
    - pause: { duration: 30s }
