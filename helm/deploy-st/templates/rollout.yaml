{{- if .Values.canary.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "deploy-st.fullname" . }}
  labels:
    {{- include "deploy-st.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      {{- include "deploy-st.selectorLabels" . | nindent 6 }}
  strategy:
    canary:
      canaryService: {{ include "deploy-st.fullname" . }}-canary
      stableService: {{ include "deploy-st.fullname" . }}
      trafficRouting:
        nginx:
          stableIngress: {{ include "deploy-st.fullname" . }}
      steps:
        {{- toYaml .Values.canary.steps | nindent 8 }}
  template:
    metadata:
      labels:
        {{- include "deploy-st.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: app
          image: "{{ .Values.image.app.repository }}:{{ .Values.image.app.tag }}"
          imagePullPolicy: {{ .Values.image.app.pullPolicy }}
          ports:
            - name: php-fpm
              containerPort: 9000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "deploy-st.fullname" . }}
            - secretRef:
                name: {{ include "deploy-st.fullname" . }}
          livenessProbe:
            tcpSocket:
              port: php-fpm
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: php-fpm
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources.app | nindent 12 }}
        - name: web
          image: "{{ .Values.image.web.repository }}:{{ .Values.image.web.tag }}"
          imagePullPolicy: {{ .Values.image.web.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            failureThreshold: 30
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources.web | nindent 12 }}
{{- end }}
