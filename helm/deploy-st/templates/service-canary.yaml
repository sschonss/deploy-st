{{- if .Values.canary.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "deploy-st.fullname" . }}-canary
  labels:
    {{- include "deploy-st.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "deploy-st.selectorLabels" . | nindent 4 }}
{{- end }}
