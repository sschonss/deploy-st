replicaCount: 1

image:
  app:
    tag: "latest"
  web:
    tag: "latest"

ingress:
  host: staging.deploy-st.local

resources:
  app:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
  web:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

hpa:
  enabled: false

pdb:
  enabled: false

env:
  APP_ENV: "staging"
  APP_DEBUG: "true"
  LOG_LEVEL: "debug"
